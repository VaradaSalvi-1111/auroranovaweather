<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
</head>

<body style="
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#0f2027,#202543,#2c5364);
    font-family:Arial, Helvetica, sans-serif;
">

    <form action="admin_login.php" method="POST" style="
        width:340px;
        background:#111;
        padding:30px;
        border-radius:12px;
        box-shadow:0 15px 40px rgba(0,0,0,0.6);
        text-align:center;
    ">

        <h2 style="
            color:#00d4ff;
            margin-bottom:25px;
            letter-spacing:1px;
        ">Admin Login</h2>

        <input type="text" name="username" placeholder="Admin Username" required style="
            width:95%;
            padding:12px;
            margin-bottom:15px;
            border-radius:8px;
            border:none;
            outline:none;
            font-size:14px;
        ">

        <input type="password" name="password" placeholder="Password" required style="
            width:95%;
            padding:12px;
            margin-bottom:20px;
            border-radius:8px;
            border:none;
            outline:none;
            font-size:14px;
        ">

        <button type="submit" style="
            width:102%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#00d4ff;
            color:#000;
            font-weight:bold;
            font-size:15px;
            cursor:pointer;
            transition:0.3s;
        "
        onmouseover="this.style.background='#00bcd4'"
        onmouseout="this.style.background='#00d4ff'">
            Login
        </button>

        <div style="margin-top:18px;">
            <a href="admin_logout.php" style="
                color:#ccc;
                font-size:13px;
                text-decoration:none;
            ">Logout</a>
        </div>

    </form>

</body>
</html>
