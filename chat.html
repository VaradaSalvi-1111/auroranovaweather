<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini AI Chatbot with Voice</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0f172a;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: space-around;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.chat-container {
  width: 400px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.chat-header {
  background: #6366f1;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.chat-box {
  height: 400px;
  padding: 15px;
  overflow-y: auto;
  background: #1e293b;
}

.msg {
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  max-width: 80%;
  word-wrap: break-word;
}

.user { 
  background: #4f46e5; 
  color: white; 
  margin-left: auto; 
  text-align: right;
}

.bot { 
  background: #334155; 
  color: white; 
}

.input-area {
  display: flex;
  border-top: 2px solid #334155;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  background: #0f172a;
  color: white;
  font-size: 14px;
}

input:focus {
  outline: none;
}

button {
  background: #6366f1;
  color: white;
  border: none;
  padding: 15px 20px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s;
}

button:hover {
  background: #4f46e5;
}

.orb-container {
  position: relative;
  width: 300px;
  height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.orb {
  position: relative;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #667eea 0%, #764ba2 50%, #f093fb 100%);
  box-shadow: 
    0 0 60px rgba(102, 126, 234, 0.6),
    0 0 120px rgba(118, 75, 162, 0.4),
    inset 0 0 60px rgba(255, 255, 255, 0.2);
  animation: breathe 4s ease-in-out infinite;
  cursor: pointer;
}

.orb::before {
  content: '';
  position: absolute;
  top: 10%;
  left: 10%;
  width: 80%;
  height: 80%;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), transparent);
  filter: blur(10px);
}

.orb::after {
  content: '';
  position: absolute;
  top: -20%;
  left: -20%;
  width: 140%;
  height: 140%;
  border-radius: 50%;
  background: transparent;
  border: 2px solid rgba(102, 126, 234, 0.3);
  animation: pulse 4s ease-in-out infinite;
}

.wave-ring {
  position: absolute;
  border-radius: 50%;
  border: 3px solid rgba(102, 126, 234, 0.4);
  animation: wave-expand 2s ease-out infinite;
}

.wave-ring:nth-child(2) { animation-delay: 0.5s; }
.wave-ring:nth-child(3) { animation-delay: 1s; }
.wave-ring:nth-child(4) { animation-delay: 1.5s; }

@keyframes breathe {
  0%, 100% {
    transform: scale(1);
    box-shadow: 
      0 0 60px rgba(102, 126, 234, 0.6),
      0 0 120px rgba(118, 75, 162, 0.4),
      inset 0 0 60px rgba(255, 255, 255, 0.2);
  }
  50% {
    transform: scale(1.1);
    box-shadow: 
      0 0 80px rgba(102, 126, 234, 0.8),
      0 0 160px rgba(118, 75, 162, 0.6),
      inset 0 0 80px rgba(255, 255, 255, 0.3);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
    opacity: 0.5;
  }
  50% {
    transform: scale(1.2);
    opacity: 0.8;
  }
}

@keyframes wave-expand {
  0% {
    width: 200px;
    height: 200px;
    opacity: 0.8;
  }
  100% {
    width: 400px;
    height: 400px;
    opacity: 0;
  }
}

.speaking {
  animation: speaking-pulse 0.3s ease-in-out infinite !important;
}

@keyframes speaking-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

.speaking .wave-ring {
  animation: wave-expand 1s ease-out infinite !important;
}

.status-text {
  position: absolute;
  bottom: -40px;
  color: #667eea;
  font-size: 14px;
  text-align: center;
  width: 100%;
}
</style>
</head>
<body>

<!-- CHATBOT SECTION -->
<div class="chat-container">
  <div class="chat-header">🤖 Gemini Chatbot</div>
  <div class="chat-box" id="chatBox"></div>
  <div class="input-area">
    <input id="userInput" placeholder="Ask something..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- VOICE ORB SECTION -->
<div class="orb-container">
  <div class="wave-ring"></div>
  <div class="wave-ring"></div>
  <div class="wave-ring"></div>
  <div class="wave-ring"></div>
  <div class="orb" id="voiceOrb"></div>
  <div class="status-text" id="statusText">Ready</div>
</div>

<script>
// ==================== VOICE ORB CODE ====================
class VoiceOrb {
  constructor() {
    this.orb = document.getElementById('voiceOrb');
    this.statusText = document.getElementById('statusText');
    this.synth = window.speechSynthesis;
    this.isSpeaking = false;
    this.voices = [];
    
    this.loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = () => this.loadVoices();
    }
  }

  loadVoices() {
    this.voices = this.synth.getVoices();
  }

  speak(text) {
    this.synth.cancel();
    if (!text) return;
    if (this.voices.length === 0) this.loadVoices();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.95;
    utterance.pitch = 1.1;
    utterance.volume = 1.0;
    utterance.lang = 'en-IN';

   if (this.voices.length > 0) {  
  let selectedVoice = this.voices.find(voice =>  
    voice.lang === 'en-IN' &&  
    (  
       voice.name.toLowerCase().includes('male') ||
        voice.name.includes('Google') ||  
      voice.name.includes('Ravi') ||
      voice.name.includes('Microsoft Rahul') ||
      voice.name.includes('Microsoft Arun')  
    )  
  );  

  // Fallback to any English female-sounding voice
  if (!selectedVoice) {  
    selectedVoice = this.voices.find(voice =>  
      voice.lang.startsWith('en') &&  
      voice.name.toLowerCase().includes('female')  
    );  
  }  

  // Final fallback
  if (!selectedVoice) selectedVoice = this.voices[0];  

  utterance.voice = selectedVoice;  
}

    utterance.onstart = () => {
      this.orb.classList.add('speaking');
      this.isSpeaking = true;
      this.statusText.textContent = 'Speaking...';
    };

    utterance.onend = () => {
      this.orb.classList.remove('speaking');
      this.isSpeaking = false;
      this.statusText.textContent = 'Ready';
    };

    utterance.onerror = (event) => {
      this.orb.classList.remove('speaking');
      this.isSpeaking = false;
      this.statusText.textContent = 'Error';
    };

    this.synth.speak(utterance);
  }

  stop() {
    this.synth.cancel();
    this.orb.classList.remove('speaking');
    this.isSpeaking = false;
    this.statusText.textContent = 'Stopped';
  }
}

const voiceOrb = new VoiceOrb();

function speakGeminiResponse(responseText) {
  voiceOrb.speak(responseText);
}

document.getElementById('voiceOrb').addEventListener('click', () => {
  speakGeminiResponse("Hello I am Aleyksaaa..! Your Personal AI Assistant..How can I assist  you..?");
});

// ==================== CHATBOT CODE ====================
const API_KEY = "AIzaSyBzyVSFkw8Ed4txnX3KhZn9n1dHQQ3DRxY";

// 🔍 LIST ALL AVAILABLE MODELS
async function listAvailableModels() {
  console.log("========================================");
  console.log("🔍 CHECKING AVAILABLE MODELS...");
  console.log("========================================");
  
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`
    );
    
    const data = await response.json();
    
    if (data.error) {
      console.error("❌ API ERROR:", data.error.message);
      addMessage("⚠️ API Key Error: " + data.error.message, "bot");
      return null;
    }
    
    if (data.models) {
      console.log("✅ AVAILABLE MODELS:");
      const availableModels = [];
      
      data.models.forEach(model => {
        const modelName = model.name.replace('models/', '');
        const methods = model.supportedGenerationMethods || [];
        
        console.log(`📌 ${modelName}`);
        console.log(`   Methods: ${methods.join(', ')}`);
        
        if (methods.includes('generateContent')) {
          availableModels.push(modelName);
        }
      });
      
      console.log("========================================");
      console.log("✅ Models that support generateContent:");
      console.log(availableModels);
      console.log("========================================");
      
      return availableModels;
    } else {
      console.error("❌ No models found");
      return null;
    }
  } catch (error) {
    console.error("❌ Error fetching models:", error);
    addMessage("⚠️ Connection error - check console", "bot");
    return null;
  }
}

// Run on page load
let workingModel = null;
listAvailableModels().then(models => {
  if (models && models.length > 0) {
    workingModel = models[0]; // Use first available model
    console.log(`✅ Will use model: ${workingModel}`);
    addMessage(`✅ Connected! Using model: ${workingModel}`, "bot");
  } else {
    addMessage("❌ No compatible models found. Please check your API key.", "bot");
  }
});

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  if (!workingModel) {
    addMessage("⚠️ No model available. Check console for details.", "bot");
    return;
  }

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${workingModel}:generateContent?key=${API_KEY}`;

  const body = {
    contents: [{
      parts: [{ text: text }]
    }]
  };

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    console.log("Response:", data);

    if (data.error) {
      const errorMsg = `Error: ${data.error.message}`;
      addMessage(errorMsg, "bot");
      speakGeminiResponse(errorMsg);
      return;
    }

    if (!data.candidates || data.candidates.length === 0) {
      const errorMsg = "No response generated";
      addMessage(errorMsg, "bot");
      speakGeminiResponse(errorMsg);
      return;
    }

    const reply = data.candidates[0].content.parts[0].text;
    addMessage(reply, "bot");
    speakGeminiResponse(reply);

  } catch (err) {
    console.error("Error:", err);
    const errorMsg = "Connection error";
    addMessage(errorMsg, "bot");
    speakGeminiResponse(errorMsg);
  }
}

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.innerText = text;
  const chatBox = document.getElementById("chatBox");
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}
</script>



</body>
</html>
